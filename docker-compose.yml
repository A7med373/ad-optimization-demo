services:
  api:
    build: .
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  bot:
    build: .
    env_file: .env.example
    command: python -m app.bot
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ad_optimization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
