<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-label="Архитектура пайплайна атрибуции рекламы">
  <rect width="1120" height="560" fill="#f8fafc"/>
  <rect x="32" y="32" width="1056" height="496" rx="16" fill="#ffffff" stroke="#d8dee9"/>
  <text x="64" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Ad attribution pipeline</text>
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Демо-архитектура: клики, заказы, матчинг, фоновые задачи и экспорт offline conversions</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="64" y="170" width="170" height="86" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="88" y="204" font-size="16" font-weight="700" fill="#0f172a">Yandex Direct</text>
    <text x="88" y="228" font-size="13" fill="#334155">click stream</text>

    <rect x="64" y="314" width="170" height="86" rx="10" fill="#ecfdf5" stroke="#059669"/>
    <text x="88" y="348" font-size="16" font-weight="700" fill="#0f172a">WB / OZON</text>
    <text x="88" y="372" font-size="13" fill="#334155">orders API</text>

    <rect x="306" y="170" width="180" height="230" rx="12" fill="#fefce8" stroke="#ca8a04"/>
    <text x="338" y="214" font-size="17" font-weight="700" fill="#0f172a">FastAPI</text>
    <text x="338" y="242" font-size="13" fill="#334155">ingestion endpoints</text>
    <text x="338" y="266" font-size="13" fill="#334155">validation</text>
    <text x="338" y="290" font-size="13" fill="#334155">idempotency keys</text>
    <text x="338" y="314" font-size="13" fill="#334155">health checks</text>

    <rect x="558" y="130" width="180" height="86" rx="10" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="594" y="164" font-size="16" font-weight="700" fill="#0f172a">Kafka</text>
    <text x="594" y="188" font-size="13" fill="#334155">event ingestion</text>

    <rect x="558" y="258" width="180" height="86" rx="10" fill="#fff1f2" stroke="#e11d48"/>
    <text x="594" y="292" font-size="16" font-weight="700" fill="#0f172a">Celery</text>
    <text x="594" y="316" font-size="13" fill="#334155">matching jobs</text>

    <rect x="558" y="386" width="180" height="86" rx="10" fill="#f1f5f9" stroke="#475569"/>
    <text x="594" y="420" font-size="16" font-weight="700" fill="#0f172a">PostgreSQL</text>
    <text x="594" y="444" font-size="13" fill="#334155">clicks, orders, matches</text>

    <rect x="812" y="170" width="190" height="86" rx="10" fill="#ecfeff" stroke="#0891b2"/>
    <text x="842" y="204" font-size="16" font-weight="700" fill="#0f172a">Matching engine</text>
    <text x="842" y="228" font-size="13" fill="#334155">72h + SKU + region</text>

    <rect x="812" y="314" width="190" height="86" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="842" y="348" font-size="16" font-weight="700" fill="#0f172a">Yandex Metrika</text>
    <text x="842" y="372" font-size="13" fill="#334155">offline conversions</text>

    <line x1="234" y1="213" x2="306" y2="213" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="234" y1="357" x2="306" y2="357" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="486" y1="214" x2="558" y2="173" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="486" y1="300" x2="558" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="648" y1="344" x2="648" y2="386" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="738" y1="300" x2="812" y2="213" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="907" y1="256" x2="907" y2="314" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>

