<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-label="Архитектура атрибуции рекламы">
  <rect width="1120" height="560" fill="#f8fafc"/>
  <rect x="32" y="32" width="1056" height="496" rx="16" fill="#ffffff" stroke="#d8dee9"/>
  <text x="64" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Ad attribution pipeline</text>
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Публичная версия: Telegram-бот, FastAPI, PostgreSQL, matching engine и export adapter</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="64" y="176" width="190" height="92" rx="10" fill="#ecfeff" stroke="#0891b2"/>
    <text x="88" y="210" font-size="17" font-weight="700" fill="#0f172a">Telegram bot</text>
    <text x="88" y="234" font-size="13" fill="#334155">summary / recompute</text>

    <rect x="64" y="306" width="190" height="92" rx="10" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="88" y="340" font-size="17" font-weight="700" fill="#0f172a">FastAPI</text>
    <text x="88" y="364" font-size="13" fill="#334155">clicks / orders / attributions</text>

    <rect x="324" y="218" width="190" height="170" rx="12" fill="#fefce8" stroke="#ca8a04"/>
    <text x="352" y="258" font-size="17" font-weight="700" fill="#0f172a">Matching engine</text>
    <text x="352" y="286" font-size="13" fill="#334155">72h window</text>
    <text x="352" y="308" font-size="13" fill="#334155">product_sku</text>
    <text x="352" y="330" font-size="13" fill="#334155">region_code</text>
    <text x="352" y="352" font-size="13" fill="#334155">user_hash</text>

    <rect x="590" y="170" width="200" height="92" rx="10" fill="#f1f5f9" stroke="#475569"/>
    <text x="620" y="204" font-size="17" font-weight="700" fill="#0f172a">PostgreSQL</text>
    <text x="620" y="228" font-size="13" fill="#334155">events and attributions</text>

    <rect x="590" y="316" width="200" height="92" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="620" y="350" font-size="17" font-weight="700" fill="#0f172a">Metrika adapter</text>
    <text x="620" y="374" font-size="13" fill="#334155">offline conversions</text>

    <rect x="854" y="224" width="190" height="92" rx="10" fill="#fff7ed" stroke="#ea580c"/>
    <text x="884" y="258" font-size="17" font-weight="700" fill="#0f172a">Business result</text>
    <text x="884" y="282" font-size="13" fill="#334155">paid click -> order</text>

    <line x1="254" y1="222" x2="324" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="254" y1="352" x2="324" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="514" y1="304" x2="590" y2="216" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="514" y1="304" x2="590" y2="362" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="790" y1="216" x2="854" y2="270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="790" y1="362" x2="854" y2="270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
